apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: awx-clus1-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/eingram-homelab/gitops-argocd.git
    targetRevision: main
    path: environments/dev/clus1/overlays/awx
  destination:
    namespace: awx
    server: https://rancher.local.lan/k8s/clusters/c-m-w4fjmt4t
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true