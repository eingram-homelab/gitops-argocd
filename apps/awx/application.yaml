apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: awx
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/eingram-homelab/gitops-argocd.git
    targetRevision: main
    path: argocd/apps/awx/kustomize
  destination:
    namespace: awx
    server: 'https://kubernetes.default.svc'
  syncPolicy:
    syncOptions:
      - CreateNamespace=true