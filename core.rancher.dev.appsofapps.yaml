apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: core-app-of-apps-rancher
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/eingram-homelab/gitops-argocd.git
    targetRevision: main
    path: environments/dev/rancher
  destination:
    namespace: argocd
    server: 'https://kubernetes.default.svc'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=false
